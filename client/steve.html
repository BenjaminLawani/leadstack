<!DOCTYPE html>
<html lang="en" class="bg-[#030303]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leadstack — Steve</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Geist', sans-serif; background-color: #030303; color: #dedede; }
        
        /* Sidebar Styles */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            background-color: #010101;
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            transition: width 0.3s ease;
            z-index: 50;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar.expanded {
            width: 240px;
        }
        
        .sidebar.collapsed {
            width: 64px;
        }
        
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 64px;
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            overflow: hidden;
        }
        
        .sidebar-logo-text {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: white;
            white-space: nowrap;
            transition: opacity 0.3s ease;
        }
        
        .sidebar.collapsed .sidebar-logo-text {
            opacity: 0;
            width: 0;
        }
        
        .toggle-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 0.375rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .toggle-btn:hover {
            background-color: rgba(255, 255, 255, 0.04);
            color: white;
        }
        
        .sidebar-nav {
            flex: 1;
            padding: 1rem 0;
            overflow-y: auto;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin: 0.25rem 0.5rem;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.04);
            color: white;
        }
        
        .nav-item.active {
            background-color: rgba(255, 255, 255, 0.08);
            color: white;
        }
        
        .nav-item-icon {
            min-width: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .nav-item-text {
            transition: opacity 0.3s ease;
        }
        
        .sidebar.collapsed .nav-item-text {
            opacity: 0;
            width: 0;
        }
        
        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .user-profile:hover {
            background-color: rgba(255, 255, 255, 0.04);
        }
        
        .user-avatar {
            min-width: 32px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .user-info {
            overflow: hidden;
            transition: opacity 0.3s ease;
        }
        
        .sidebar.collapsed .user-info {
            opacity: 0;
            width: 0;
        }
        
        .user-name {
            font-size: 0.875rem;
            color: white;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .user-email {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            white-space: nowrap;
        }
        
        /* Main content adjustment */
        .main-wrapper {
            transition: margin-left 0.3s ease;
        }
        
        .main-wrapper.sidebar-expanded {
            margin-left: 240px;
        }
        
        .main-wrapper.sidebar-collapsed {
            margin-left: 64px;
        }
    </style>
</head>
<body class="antialiased min-h-screen">
    
    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="sidebar expanded">
        <!-- Sidebar Header -->
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="9" stroke-opacity="0.2"/>
                    <path d="M12 3v18" stroke-opacity="0.8"/>
                </svg>
                <span class="sidebar-logo-text">Leadstack</span>
            </div>
            <button id="toggleSidebar" class="toggle-btn">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
        </div>
        
        <!-- Navigation Items -->
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" data-page="overview">
                <span class="nav-item-icon">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                </span>
                <span class="nav-item-text">Overview</span>
            </a>
            
            <a href="#analytics" class="nav-item" data-page="analytics">
                <span class="nav-item-icon">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3v18h18"/>
                        <path d="M18 17V9"/>
                        <path d="M13 17V5"/>
                        <path d="M8 17v-3"/>
                    </svg>
                </span>
                <span class="nav-item-text">Analytics</span>
            </a>
            
            <a href="#pipeline" class="nav-item" data-page="pipeline">
                <span class="nav-item-icon">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </span>
                <span class="nav-item-text">Pipeline</span>
            </a>
            
            <a href="steve.html" class="nav-item active" data-page="steve">
                <span class="nav-item-icon">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </span>
                <span class="nav-item-text">Steve</span>
            </a>
        </nav>
        
        <!-- User Profile -->
        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="userName">User</div>
                    <div class="user-email" id="userEmailSidebar">user@example.com</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Wrapper -->
    <div id="mainWrapper" class="main-wrapper sidebar-expanded">
        <!-- Header -->
        <header class="border-b border-white/[0.04] bg-[#010101]">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <h1 class="text-lg font-medium text-white">Steve</h1>
                </div>
                
                <div class="flex items-center gap-4">
                    <button id="logoutButton" class="text-xs text-zinc-400 hover:text-white transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-6 py-12">
            <div class="flex flex-col items-center justify-center min-h-[calc(100vh-200px)]">
                <div class="w-full max-w-2xl space-y-6">
                    
                    <!-- Steve Header -->
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-medium text-white mb-2">I'm Steve, your lead gathering guy</h2>
                        <p class="text-sm text-zinc-500">Ask me anything about finding and managing leads</p>
                    </div>

                    <!-- Chat Messages Container -->
                    <div id="chatMessages" class="space-y-4 mb-6 max-h-[500px] overflow-y-auto hidden">
                        <!-- Messages will be inserted here -->
                    </div>

                    <!-- Chat Box -->
                    <div class="flex flex-col rounded-2xl border border-white/[0.06] bg-white/[0.01] shadow-xl min-h-[120px]">

                        <!-- Textarea -->
                        <div class="flex-1 relative overflow-y-auto max-h-[258px]">
                            <textarea
                                id="promptInput"
                                placeholder="Ask anything"
                                class="w-full min-h-[120px] resize-none border-0 bg-transparent p-4 text-[16px] text-white outline-none focus:ring-0 placeholder:text-zinc-600"
                            ></textarea>
                        </div>

                        <!-- Bottom Controls -->
                        <div class="flex items-center gap-2 p-2  border-white/[0.04]">

                            <!-- Cloud Button -->
                            <div class="flex items-center justify-center rounded-full bg-white/[0.04] p-2 text-zinc-400">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                                </svg>
                            </div>

                            

                            <!-- Right Actions -->
                            <div class="ml-auto flex items-center gap-3">

                                <!-- Image Button -->
                                <button
                                    class="text-zinc-400 hover:text-white transition"
                                    title="Attach images"
                                >
                                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                        <circle cx="8.5" cy="8.5" r="1.5"/>
                                        <path d="M21 15l-5-5L5 21"/>
                                    </svg>
                                </button>

                                <!-- Send Button -->
                                <button
                                    id="sendBtn"
                                    disabled
                                    class="rounded-full bg-white/[0.04] p-2 transition disabled:opacity-50 disabled:cursor-not-allowed hover:bg-white/[0.08] text-white"
                                >
                                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 19V5M5 12l7-7 7 7"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Prompt Buttons -->
                    <div class="flex flex-wrap justify-center gap-2">

                        <button
                            class="prompt-btn rounded-full border border-white/[0.06] bg-white/[0.01] px-4 py-2 text-sm hover:bg-white/[0.04] transition text-zinc-300 flex items-center gap-2"
                            data-prompt="Help me find leads in the tech industry with companies that have 50-200 employees."
                        >
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                            Find tech leads
                        </button>

                        <button
                            class="prompt-btn rounded-full border border-white/[0.06] bg-white/[0.01] px-4 py-2 text-sm hover:bg-white/[0.04] transition text-zinc-300 flex items-center gap-2"
                            data-prompt="Show me the best strategies for reaching out to potential leads via email."
                        >
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="4" width="20" height="16" rx="2"/>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                            </svg>
                            Email strategies
                        </button>

                        <button
                            class="prompt-btn rounded-full border border-white/[0.06] bg-white/[0.01] px-4 py-2 text-sm hover:bg-white/[0.04] transition text-zinc-300 flex items-center gap-2"
                            data-prompt="Analyze my current pipeline and suggest improvements for better conversion rates."
                        >
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 3v18h18"/>
                                <path d="M18 17V9"/>
                                <path d="M13 17V5"/>
                                <path d="M8 17v-3"/>
                            </svg>
                            Analyze pipeline
                        </button>

                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/auth-utils.js"></script>
    <script>
        // Require authentication
        requireAuth();
        
        // Fetch and display user info from /me endpoint
        async function loadUserInfo() {
            try {
                const response = await authenticatedFetch('/auth/me');
                if (response.ok) {
                    const user = await response.json();
                    // Update UI with user info
                    document.getElementById('userEmailSidebar').textContent = user.email;
                    document.getElementById('userName').textContent = user.name || 'User';
                    // Set avatar to first letter of name or email
                    const avatarLetter = (user.name || user.email).charAt(0).toUpperCase();
                    document.getElementById('userAvatar').textContent = avatarLetter;
                }
            } catch (error) {
                console.error('Error loading user info:', error);
                // If we can't load user info, redirect to login
                clearAuthToken();
                window.location.href = '/auth/login';
            }
        }
        
        // Load user info on page load
        loadUserInfo();
        
        // Logout handler
        document.getElementById('logoutButton').addEventListener('click', () => {
            logout();
        });
        
        // Sidebar toggle functionality
        const sidebar = document.getElementById('sidebar');
        const mainWrapper = document.getElementById('mainWrapper');
        const toggleBtn = document.getElementById('toggleSidebar');
        const toggleIcon = toggleBtn.querySelector('svg path');
        
        toggleBtn.addEventListener('click', () => {
            const isExpanded = sidebar.classList.contains('expanded');
            
            if (isExpanded) {
                sidebar.classList.remove('expanded');
                sidebar.classList.add('collapsed');
                mainWrapper.classList.remove('sidebar-expanded');
                mainWrapper.classList.add('sidebar-collapsed');
                toggleIcon.setAttribute('d', 'M9 18l6-6-6-6');
            } else {
                sidebar.classList.remove('collapsed');
                sidebar.classList.add('expanded');
                mainWrapper.classList.remove('sidebar-collapsed');
                mainWrapper.classList.add('sidebar-expanded');
                toggleIcon.setAttribute('d', 'M15 18l-6-6 6-6');
            }
            
            // Save state to localStorage
            localStorage.setItem('sidebarExpanded', !isExpanded);
        });
        
        // Restore sidebar state from localStorage
        const savedState = localStorage.getItem('sidebarExpanded');
        if (savedState === 'false') {
            toggleBtn.click();
        }
        
        // Navigation active state
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                
                // Remove active class from all items
                navItems.forEach(nav => nav.classList.remove('active'));
                
                // Add active class to clicked item
                item.classList.add('active');
                
                // Navigate to the page
                const href = item.getAttribute('href');
                if (href && href !== '#' && !href.startsWith('#')) {
                    window.location.href = href;
                }
            });
        });

        // Chat functionality
        const input = document.getElementById("promptInput");
        const sendBtn = document.getElementById("sendBtn");
        const promptButtons = document.querySelectorAll(".prompt-btn");

        // Enable / disable send button
        input.addEventListener("input", () => {
            sendBtn.disabled = input.value.trim() === "";
        });

        // Prompt button click
        promptButtons.forEach((button) => {
            button.addEventListener("click", () => {
                const prompt = button.dataset.prompt;
                input.value = prompt;
                input.focus();
                sendBtn.disabled = false;
            });
        });

        // Chat messages container
        const chatMessages = document.getElementById("chatMessages");
        let messageHistory = [];

        // Function to add message to chat
        function addMessage(content, isUser = true) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            
            const messageBubble = document.createElement("div");
            messageBubble.className = `max-w-[80%] rounded-2xl px-4 py-3 ${
                isUser
                    ? 'bg-white/[0.08] text-white'
                    : 'bg-white/[0.04] text-zinc-300 border border-white/[0.06]'
            }`;
            
            if (isUser) {
                messageBubble.textContent = content;
            } else {
                // For AI responses, support markdown-like formatting
                messageBubble.innerHTML = formatAIResponse(content);
            }
            
            messageDiv.appendChild(messageBubble);
            chatMessages.appendChild(messageDiv);
            chatMessages.classList.remove('hidden');
            
            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Function to format AI response
        function formatAIResponse(text) {
            // Basic formatting for better readability
            return text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>');
        }

        // Function to add loading indicator
        function addLoadingIndicator() {
            const loadingDiv = document.createElement("div");
            loadingDiv.id = "loadingIndicator";
            loadingDiv.className = "flex justify-start";
            
            const loadingBubble = document.createElement("div");
            loadingBubble.className = "max-w-[80%] rounded-2xl px-4 py-3 bg-white/[0.04] border border-white/[0.06]";
            loadingBubble.innerHTML = `
                <div class="flex items-center gap-2 text-zinc-400">
                    <svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                    </svg>
                    <span class="text-sm">Steve is thinking...</span>
                </div>
            `;
            
            loadingDiv.appendChild(loadingBubble);
            chatMessages.appendChild(loadingDiv);
            chatMessages.classList.remove('hidden');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Function to remove loading indicator
        function removeLoadingIndicator() {
            const loading = document.getElementById("loadingIndicator");
            if (loading) {
                loading.remove();
            }
        }

        // Function to detect if message is a lead search request
        function isLeadSearchRequest(message) {
            const searchKeywords = ['find leads', 'search for', 'look for leads', 'get leads', 'find companies'];
            return searchKeywords.some(keyword => message.toLowerCase().includes(keyword));
        }

        // Function to extract search parameters from message
        function extractSearchParams(message) {
            const params = {};
            
            // Extract industry
            const industryMatch = message.match(/(?:in|for)\s+(?:the\s+)?(\w+(?:\s+\w+)?)\s+industry/i);
            if (industryMatch) params.industry = industryMatch[1];
            
            // Extract location
            const locationMatch = message.match(/(?:in|at|from)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/);
            if (locationMatch) params.location = locationMatch[1];
            
            // Extract company size
            const sizeMatch = message.match(/(\d+[-–]\d+)\s+employees/i);
            if (sizeMatch) params.company_size = sizeMatch[1];
            
            return params;
        }

        // Function to send message to AI
        async function sendMessage(message) {
            if (!message.trim()) return;
            
            // Add user message to chat
            addMessage(message, true);
            
            // Clear input
            input.value = "";
            sendBtn.disabled = true;
            
            // Show loading indicator
            addLoadingIndicator();
            
            try {
                const token = getAuthToken();
                let endpoint = '/ai/query';
                let requestBody = {
                    query: message,
                    context: {
                        message_history: messageHistory
                    }
                };
                
                // Check if this is a lead search request
                if (isLeadSearchRequest(message)) {
                    const searchParams = extractSearchParams(message);
                    if (searchParams.industry) {
                        endpoint = '/ai/search-leads';
                        requestBody = {
                            industry: searchParams.industry,
                            location: searchParams.location,
                            company_size: searchParams.company_size,
                            additional_criteria: message
                        };
                    }
                }
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `${token.tokenType.charAt(0).toUpperCase() + token.tokenType.slice(1)} ${token.accessToken}`
                    },
                    body: JSON.stringify(requestBody)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Remove loading indicator
                removeLoadingIndicator();
                
                // Format response based on endpoint
                let responseText;
                if (endpoint === '/ai/search-leads' && data.leads && data.leads.length > 0) {
                    responseText = `I found ${data.total_found} potential leads for you:\n\n${
                        data.leads.slice(0, 5).map((lead, i) =>
                            `${i + 1}. ${lead.title || 'Lead'}\n   ${lead.snippet || ''}\n   ${lead.link || ''}`
                        ).join('\n\n')
                    }${data.total_found > 5 ? `\n\n...and ${data.total_found - 5} more results.` : ''}`;
                } else {
                    responseText = data.response || 'I processed your request successfully.';
                }
                
                // Add AI response to chat
                addMessage(responseText, false);
                
                // Update message history
                messageHistory.push({
                    role: 'user',
                    content: message
                });
                messageHistory.push({
                    role: 'assistant',
                    content: responseText
                });
                
            } catch (error) {
                console.error('Error sending message:', error);
                removeLoadingIndicator();
                addMessage('Sorry, I encountered an error. Please try again.', false);
            }
        }

        // Send button click
        sendBtn.addEventListener("click", () => {
            const message = input.value.trim();
            if (message) {
                sendMessage(message);
            }
        });

        // Enter key to send (Shift+Enter for new line)
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                const message = input.value.trim();
                if (message) {
                    sendMessage(message);
                }
            }
        });
    </script>

</body>
</html>
